name: release

on:
  push:
    tags:
      - 'v*'        # e.g. v1.5.7

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and test
        run: |
          dotnet build NotepadMinus.sln -c Release --nologo
          dotnet test NotepadMinus.sln -c Release --no-build --nologo

      - name: Publish single-file Windows exe
        run: |
          dotnet publish src/NotepadMinus/NotepadMinus.csproj `
            -c Release -r win-x64 --self-contained true `
            -o publish --nologo

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $h = (Get-FileHash publish/NotepadMinus.exe -Algorithm SHA256).Hash.ToLower()
          "$h *NotepadMinus.exe" | Out-File -Encoding ascii publish/NotepadMinus.exe.sha256
          Write-Host "SHA-256: $h"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/NotepadMinus.exe
            publish/NotepadMinus.exe.sha256
          generate_release_notes: true
